<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="data:," />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>hitstop — sprite editor</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0d1026; color: #94b0c2; font: 13px/1.5 monospace; }
    body { display: flex; flex-direction: column; }
    header { padding: 8px 12px; background: #07070d; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    header h1 { font-size: 14px; margin: 0 12px 0 0; color: #f4f4f4; }
    main { flex: 1; display: flex; min-height: 0; }
    #side-left, #side-right { width: 260px; padding: 10px; background: #101430; overflow-y: auto; flex-shrink: 0; }
    #center { flex: 1; overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 20px; background: #07070d; }
    canvas { image-rendering: pixelated; }
    #grid { cursor: crosshair; border: 1px solid #33447f; }
    h2 { font-size: 12px; color: #ffcd75; margin: 14px 0 6px; text-transform: uppercase; }
    h2:first-child { margin-top: 0; }
    button, select, input {
      background: #1f2a57; color: #f4f4f4; border: 1px solid #33447f;
      border-radius: 4px; padding: 4px 8px; font: inherit; cursor: pointer;
    }
    button:hover { background: #33447f; }
    button.active { background: #38b764; color: #07070d; border-color: #38b764; }
    .swatch { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
    .swatch button { flex: 1; text-align: left; }
    .chip { width: 14px; height: 14px; border: 1px solid #566c86; display: inline-block; flex-shrink: 0; }
    .chip.none { background: repeating-conic-gradient(#333 0 25%, #111 0 50%) 0 0 / 8px 8px; }
    label { display: block; margin: 4px 0; }
    input[type=number] { width: 56px; }
    input[type=color] { padding: 0; width: 32px; height: 22px; }
    textarea { width: 100%; height: 140px; background: #07070d; color: #94b0c2; border: 1px solid #33447f; font: 11px monospace; }
    .hint { color: #566c86; font-size: 11px; }
    #frames button { margin-right: 4px; }
    #preview { border: 1px solid #33447f; background: #0a0c1c; max-width: 100%; height: auto; }
    #status { color: #38b764; margin-left: auto; }
  </style>
</head>
<body>
  <header>
    <h1>hitstop sprite editor</h1>
    <select id="selectSprite" style="background:#1f2a57; color:#f4f4f4; border:1px solid #33447f; border-radius:4px; padding:4px;">
      <option value="">-- load existing sprite --</option>
      <option value="knight.json">knight</option>
      <option value="slime.json">slime</option>
      <option value="bat.json">bat</option>
      <option value="merchant.json">merchant</option>
      <option value="hud.json">hud</option>
      <option value="icons.json">icons</option>
      <option value="equipment/iron-helmet.json">iron helmet</option>
      <option value="equipment/steel-armor.json">steel armor</option>
    </select>
    <button id="btnLoad" title="Open a .json sprite file">load local file...</button>
    <button id="btnSave" title="Download the current sprite as .json">save</button>
    <button id="btnUndo" title="Undo (Ctrl+Z)" disabled>undo</button>
    <button id="btnRedo" title="Redo (Ctrl+Y)" disabled>redo</button>
    <button id="btnExport" title="Copy JSON to clipboard">export</button>
    <button id="btnImport" title="Import JSON from the textarea">import</button>
    <input type="file" id="fileInput" accept=".json,application/json" style="display:none">
    <span id="status"></span>
  </header>
  <main>
    <div id="side-left">
      <h2>palette</h2>
      <div id="palette"></div>
      <div class="swatch">
        <input type="color" id="newColor" value="#38b764">
        <input type="text" id="newChar" maxlength="1" placeholder="ch" style="width:34px">
        <button id="btnAddColor">add</button>
      </div>
      <h2>tools</h2>
      <div style="display:flex; gap:6px; margin-bottom:6px">
        <button id="btnToolDraw" class="active">pencil</button>
        <button id="btnToolFill">fill</button>
      </div>
      <h2>reference</h2>
      <div style="display:flex; flex-direction:column; gap:4px">
        <select id="selectRefSprite" style="background:#1f2a57; color:#f4f4f4; border:1px solid #33447f; border-radius:4px; padding:4px;">
          <option value="">-- select reference --</option>
          <option value="knight.json">knight</option>
          <option value="slime.json">slime</option>
          <option value="bat.json">bat</option>
          <option value="merchant.json">merchant</option>
          <option value="hud.json">hud</option>
          <option value="icons.json">icons</option>
          <option value="equipment/iron-helmet.json">iron helmet</option>
          <option value="equipment/steel-armor.json">steel armor</option>
        </select>
        <button id="btnLoadRef">load local ref...</button>
      </div>
      <input type="file" id="refFileInput" accept=".json,application/json" style="display:none">
      <label style="display:block; margin-top:6px">
        <input type="checkbox" id="showRef" checked> show reference (30% opacity)
      </label>
      <h2>onion skin</h2>
      <label style="display:block; margin-top:6px">
        <input type="checkbox" id="onionSkin"> onion skin (previous frame)
      </label>
    </div>
    
    <div id="center">
      <canvas id="grid"></canvas>
    </div>
    
    <div id="side-right">
      <h2>preview <label style="display:inline"><input type="checkbox" id="hd" checked> hd</label></h2>
      <div style="display:flex; justify-content:center; margin-bottom:10px;">
        <canvas id="preview" width="200" height="80"></canvas>
      </div>
      
      <h2>animations</h2>
      <div id="anims" style="margin-bottom:6px"></div>
      <div style="display:flex; gap:4px; margin-bottom:6px">
        <button id="btnAddAnim" style="flex:1">+ anim</button>
        <button id="btnRenameAnim" style="flex:1">rename</button>
        <button id="btnDelAnim" style="flex:1">del</button>
      </div>
      <label style="display:block; margin-bottom:10px">fps <input id="fps" type="number" min="1" max="30" value="8" style="width:70px"></label>
      
      <h2>frames <span id="frameOf" class="hint"></span></h2>
      <div id="frames" style="margin-bottom:6px; display:flex; flex-wrap:wrap; gap:4px"></div>
      <div style="display:flex; gap:4px; margin-bottom:10px">
        <button id="btnAddFrame" style="flex:1">+ frame</button>
        <button id="btnDupFrame" style="flex:1">dup</button>
        <button id="btnDelFrame" style="flex:1">del</button>
      </div>
      
      <h2>size</h2>
      <div style="display:flex; gap:6px; align-items:center; margin-bottom:6px">
        <label style="margin:0">w <input id="w" type="number" min="1" max="64" value="12" style="width:50px"></label>
        <label style="margin:0">h <input id="h" type="number" min="1" max="64" value="14" style="width:50px"></label>
        <button id="btnResize">resize</button>
      </div>

      <h2>physical</h2>
      <div style="display:flex; gap:6px; align-items:center; margin-bottom:6px">
        <label style="margin:0">w <input id="physW" type="number" min="0.25" max="64" step="0.25" style="width:50px"></label>
        <label style="margin:0">h <input id="physH" type="number" min="0.25" max="64" step="0.25" style="width:50px"></label>
      </div>

      <h2 style="display:inline">hitbox</h2> <label style="font-size:12px"><input id="showHitbox" type="checkbox" checked> show</label>
      <div style="display:flex; flex-direction:column; gap:4px; margin-bottom:6px">
        <div style="display:flex; gap:6px; align-items:center">
          <label style="margin:0">x <input id="boxX" type="number" step="0.25" style="width:50px"></label>
          <label style="margin:0">y <input id="boxY" type="number" step="0.25" style="width:50px"></label>
        </div>
        <div style="display:flex; gap:6px; align-items:center">
          <label style="margin:0">w <input id="boxW" type="number" min="0.25" step="0.25" style="width:50px"></label>
          <label style="margin:0">h <input id="boxH" type="number" min="0.25" step="0.25" style="width:50px"></label>
        </div>
      </div>
      
      <h2>transform</h2>
      <div style="display:flex; gap:4px; margin-bottom:10px">
        <button id="btnNudgeLeft" title="Nudge left" style="flex:1">◀</button>
        <button id="btnNudgeUp" title="Nudge up" style="flex:1">▲</button>
        <button id="btnNudgeDown" title="Nudge down" style="flex:1">▼</button>
        <button id="btnNudgeRight" title="Nudge right" style="flex:1">▶</button>
      </div>
      
      <h2>sprite json</h2>
      <textarea id="io" spellcheck="false" style="height:100px; margin-bottom:6px;"></textarea>
      <p class="hint" style="margin:0">
        paint: left-drag &middot; erase: right-drag<br>
        export/import JSON (content/sprites/*.json)
      </p>
    </div>
  </main>
  <script type="module" src="/tools/src/sprite-editor.ts"></script>
</body>
</html>
