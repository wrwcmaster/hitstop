<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="data:," />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>hitstop — sprite-sheet slicer</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0d1026; color: #94b0c2; font: 13px/1.5 monospace; }
    body { display: flex; flex-direction: column; }
    header { padding: 8px 12px; background: #07070d; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    header h1 { font-size: 14px; margin: 0 12px 0 0; color: #f4f4f4; }
    main { flex: 1; display: flex; min-height: 0; }
    #side { width: 280px; padding: 10px; background: #101430; overflow-y: auto; flex-shrink: 0; }
    #view { flex: 1; overflow: auto; background: #07070d; padding: 16px; }
    #sheet { image-rendering: pixelated; display: block; }
    h2 { font-size: 12px; color: #ffcd75; margin: 14px 0 6px; text-transform: uppercase; }
    h2:first-child { margin-top: 0; }
    button, select, input {
      background: #1f2a57; color: #f4f4f4; border: 1px solid #33447f;
      border-radius: 4px; padding: 4px 8px; font: inherit; cursor: pointer;
    }
    button:hover { background: #33447f; }
    label { display: block; margin: 4px 0; }
    input[type=number] { width: 56px; }
    input[type=text] { width: 100%; }
    textarea { width: 100%; height: 130px; background: #07070d; color: #94b0c2; border: 1px solid #33447f; font: 11px monospace; }
    .hint { color: #566c86; font-size: 11px; }
    .anim { border: 1px solid #33447f; border-radius: 4px; padding: 6px; margin: 6px 0; }
    .anim .row { display: flex; gap: 6px; align-items: center; margin: 2px 0; }
    .anim .row span { width: 46px; color: #ffcd75; }
    #preview { border: 1px solid #33447f; background: #0a0c1c; }
    #status { color: #38b764; margin-left: auto; }
  </style>
</head>
<body>
  <header>
    <h1>hitstop sheet slicer</h1>
    <button id="btnLoad">load png</button>
    <button id="btnExport">export descriptor</button>
    <input type="file" id="fileInput" accept=".png,image/png,image/*" style="display:none">
    <span id="status"></span>
  </header>
  <main>
    <div id="side">
      <h2>grid</h2>
      <label>frame w <input id="fw" type="number" min="1" value="32">
             h <input id="fh" type="number" min="1" value="48"></label>
      <label>margin <input id="margin" type="number" min="0" value="0">
             spacing <input id="spacing" type="number" min="0" value="0"></label>
      <label>texel <input id="texel" type="number" min="1" value="4">
        <span class="hint">src px per logical px</span></label>
      <h2>animations</h2>
      <div id="anims"></div>
      <button id="btnAddAnim">+ anim</button>
      <h2>preview <label style="display:inline"><input type="checkbox" id="playing" checked> play</label></h2>
      <canvas id="preview" width="240" height="90"></canvas>
      <h2>descriptor</h2>
      <textarea id="io" spellcheck="false" readonly></textarea>
      <p class="hint">
        load a sheet, set the grid, list each animation's frame numbers
        (shown on the sheet), then export the descriptor. Save it next to
        the PNG and load both with <code>loadSheet</code> — see
        docs/design-tools.md.
      </p>
    </div>
    <div id="view"><canvas id="sheet"></canvas></div>
  </main>
  <script type="module" src="/tools/src/sheet-slicer.ts"></script>
</body>
</html>
