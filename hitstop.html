  <title>hitstop — game feel is the foundation</title>
  <style>
    /* touch-action: none disables double-tap-to-zoom and pinch-zoom, so a
       double tap does nothing special (the game handles taps itself). */
    html, body { margin: 0; height: 100%; background: #07070d; overflow: hidden; touch-action: none; }
    body { display: flex; align-items: center; justify-content: center; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; background: #07070d; touch-action: none; }
    #tc { position: fixed; inset: 0; pointer-events: none; font-family: monospace; }
    .btn {
      position: absolute; width: 56px; height: 56px; border-radius: 12px;
      background: rgba(148, 176, 194, 0.14); border: 2px solid rgba(148, 176, 194, 0.35);
      color: #94b0c2; font-size: 20px; display: flex; align-items: center; justify-content: center;
      pointer-events: auto; user-select: none; -webkit-user-select: none; touch-action: none;
    }
    .btn:active { background: rgba(148, 176, 194, 0.3); }
    #bL { left: 16px; bottom: 88px; }
    #bR { left: 84px; bottom: 88px; }
    #bJ { right: 16px; bottom: 150px; }
    #bA { right: 84px; bottom: 88px; }
    #bD { right: 16px; bottom: 88px; }
    /* Interact / "use" (talk to NPCs) — the touch equivalent of E. */
    #bI { right: 84px; bottom: 150px; font-size: 13px; }
    /* Menu / Esc — the mobile equivalent of the Esc key, tucked top-right. */
    #bM { right: 12px; top: 12px; width: 40px; height: 40px; font-size: 18px; }
    @media (pointer: fine) { #tc { display: none; } }
