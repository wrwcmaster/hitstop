  <title>hitstop — game feel is the foundation</title>
  <style>
    /* touch-action: none disables double-tap-to-zoom and pinch-zoom, so a
       double tap does nothing special (the game handles taps itself). */
    html, body { margin: 0; height: 100%; background: #07070d; overflow: hidden; touch-action: none; }
    body { display: flex; align-items: center; justify-content: center; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; background: #07070d; touch-action: none; }
    #tc { position: fixed; inset: 0; pointer-events: none; font-family: monospace; }
    .btn {
      position: absolute; width: 56px; height: 56px; border-radius: 12px;
      background: rgba(148, 176, 194, 0.14); border: 2px solid rgba(148, 176, 194, 0.35);
      color: #94b0c2; font-size: 20px; display: flex; align-items: center; justify-content: center;
      pointer-events: auto; user-select: none; -webkit-user-select: none; touch-action: none;
    }
    .btn:active { background: rgba(148, 176, 194, 0.3); }
    #bL { left: 16px; bottom: 88px; }
    #bR { left: 84px; bottom: 88px; }
    #bJ { right: 16px; bottom: 150px; }
    #bA { right: 84px; bottom: 88px; }
    #bD { right: 16px; bottom: 88px; }
    /* Interact / "use" (talk to NPCs) — the touch equivalent of E. */
    #bI { right: 84px; bottom: 150px; font-size: 13px; }
    /* Ice shard — the touch equivalent of B. */
    #bF { right: 152px; bottom: 88px; font-size: 22px; color: #73eff7; }
    /* Parry — the touch equivalent of F. */
    #bP { right: 152px; bottom: 150px; font-size: 20px; color: #ffcd75; }
    /* Menu / Esc — the mobile equivalent of the Esc key, tucked top-right. */
    #bM { right: 12px; top: 12px; width: 48px; height: 48px; font-size: 20px; }
    @media (pointer: fine) { #tc { display: none; } }
  </style>

才能安眠。","The Duelist. Saber and sidearm. Watch the glint - it always fires after the glint.":"决斗者。马刀与手枪。盯住那道寒光——枪声总在寒光之后。","And when she blurs, knight... do not be where you were.":"当她化作残影时,骑士……千万别留在原地。","The saber drops. She salutes with an empty hand and is gone.":"马刀坠地。她以空手行礼,随即消失。","Her sidearm stays. A duelist pays her debts, knight.":"她的手枪留下了。决斗者向来偿清欠债,骑士。","The town vault. The old kings trapped it better than they filled it.":"小镇宝库。先王们设下的机关,比他们存下的财宝还要多。","Spikes forgive nothing. Levers remember. Plates forget the moment you step off.":"尖刺从不留情。拉杆会记住,踏板在你离开的瞬间便已忘却。",KNIGHT:"骑士",MAGE:"法师",TIDECALLER:"唤潮者","Steel and stubbornness. Hits harder, stands longer.":"钢铁与执拗。出手更重,站得更久。","The arcane path. Deep mana, learned nova, thin armor.":"奥术之路。法力深厚,习得新星,甲胄单薄。","The drowned path. Fast on land, faster below.":"沉水之路。陆上迅捷,水下更快。",STEEL:"钢铁",VALOR:"勇气",ARCANA:"奥术",FROST:"霜寒",TIDE:"潮汐",WIND:"疾风",COLOSSUS:"巨人","+2 max HP and +1 attack":"+2 生命上限,+1 攻击","RIME WELL":"霜之泉","GLACIAL SKIN":"冰肤","WINTER'S EDGE":"凛冬之刃","+1 attack, frost-sharpened":"+1 攻击,经霜磨砺","OTTER BLOOD":"水獭之血","+1 max HP, stronger strokes":"+1 生命上限,划水更有力","FLEET FOOT":"疾行","Run 15% faster":"跑速提升 15%","GALE DASH":"风驰","Dash cooldown nearly halved":"冲刺冷却近乎减半","Already your calling":"这已是你的天命","{name} now walks this road":"{name}踏上了这条路","Change class to walk this path":"先转职,方能走这条路","Already learned":"早已习得","Learn the node above first":"先学会上面的节点","{name} LEARNED!":"习得{name}!","Not enough skill points":"技能点不足","Z: become a {name}":"Z:转职为{name}","Z: learn - up: class - Esc: back":"Z:学习 - 上:职业 - Esc:返回","TIDE BREAKER":"破浪","+2 attack on every swing":"每次挥击 +2 攻击","DEEP LUNGS":"深海之肺","Much longer breath, stronger strokes":"呼吸更持久,划水更有力","ABYSSAL WELL":"深渊之泉","+1 max MP from the deep":"来自深海的 +1 法力上限","The Drowned Grotto":"沉水洞窟","The grotto drowned long before the king grew fat.":"早在国王养膘之前,这座洞窟便已沉入水中。","Breathe at the surface. Dive with down. And watch your bubbles, knight.":"在水面换气,按下键下潜。骑士,盯紧你的气泡。",HEALED:"已治愈","ALREADY WHOLE":"毫发无损","NEED {n} GOLD":"需要 {n} 金币","QUEST ACCEPTED":"接受任务","NOTHING LEFT TO TEACH THIS BLADE":"这把剑已臻化境","FORGED +{n}":"锻造 +{n}","+{n} GOLD":"+{n} 金币","Not enough gold":"金币不足",OWNED:"已拥有",TALK:"交谈","RUSTY SWORD":"锈剑","GREAT SWORD":"巨剑","IRON HELMET":"铁盔","STEEL ARMOR":"钢甲",POTION:"药水","MANA ORB":"法力球",COIN:"金币","HASTE DRAUGHT":"疾速药剂","HUNTING BOW":"猎弓","Arrows arc. Lead your mark.":"箭矢成弧。提前量,瞄准目标。",FLINTLOCK:"燧发枪","One loud argument, slowly reloaded.":"一声巨响定胜负,装填缓慢。","GATE KEY":"大门钥匙","CULL THE SLIMES":"清剿史莱姆","Slay 5 slimes for the town elder.":"为镇上的长老消灭 5 只史莱姆。",VOICE:"声音",HEALER:"治疗师",BLACKSMITH:"铁匠",ELDER:"长老",MERCHANT:"商人","SLIME KING":"史莱姆王","Another knight. The arena remembers them all.":"又一位骑士。竞技场记得他们每一个。","The slimes come in waves. The bats come for your head.":"史莱姆成波而来,蝙蝠直取你的首级。","Strike thrice for the heavy blow. Dash through what you cannot block.":"三连击可出重斩。挡不住的,就冲刺穿过去。","And when your hands burn... press C. You will understand.":"当你双手灼热时……按下 C,你自会明白。","I am ready.":"我准备好了。","Who are you?":"你是谁?","The last one who asked is wave seven now.":"上一个这么问的人,现在是第七波了。","Fight well, knight. The gate east opens to the cavern, if the waves bore you.":"好好战斗,骑士。若嫌波次无聊,东边的门通往洞窟。","The cavern. Quieter than the arena. Not safer.":"洞窟。比竞技场安静,却并不更安全。","Something old and green sits on a throne past the east gate.":"东门之后,有个又老又绿的东西坐在王座上。","Bow, or do not. He cannot tell.":"鞠躬与否,悉听尊便。反正他分不出来。","...Blorp.":"……咕啵。","When he shivers, move. When he burns red, pray.":"他颤抖时,快跑。他烧红时,祈祷吧。","Ah. A customer with a pulse. Rare, down here.":"啊,一位还有脉搏的客人。在这下面可真少见。","Coins for goods. Goods for surviving. Everyone wins.":"金币换货物,货物保性命。皆大欢喜。","Show me your wares.":"看看你的货物。","Where am I?":"这是哪里?","Just passing.":"路过而已。","The cavern under the arena. The king sits past the east gate.":"竞技场下的洞窟。国王就在东门之后。","He eats swords, you know. And the knights holding them.":"他吃剑,你知道吗。连举着剑的骑士一起吃。","And he spits. Sticky business, that. A draught burns it right off.":"他还会吐口水,黏糊糊的。一剂药水就能烧掉。","The crown rolls. The throne sits empty.":"王冠滚落,王座空悬。","You are what the arena remembers now, knight.":"如今竞技场记住的,是你,骑士。","The seal on the east road is broken. The town is waking up.":"东路的封印已破。小镇正在苏醒。","The town. It slept while the king sat fat below.":"小镇。国王在下面养膘时,它一直沉睡。","A healer, a smith, an elder with troubles - and a portal, humming east.":"治疗师、铁匠、满腹愁事的长老——还有东边嗡鸣的传送门。","Sit. You are more wound than knight.":"坐下吧。你身上的伤比骑士本身还多。","Ten gold and I will close all of it.":"十枚金币,我把它们全部合上。","Heal me. (10g)":"治疗我。(10金)","Not now.":"先不用。","That edge would bounce off warm bread.":"你这剑刃,砍热面包都会弹开。","Gold and fire fix most things. Swords especially.":"金子和炉火能修好大多数东西,尤其是剑。","Upgrade my weapon.":"强化我的武器。","Maybe later.":"以后再说。","Knight. The king is dead, but his spawn still choke the arena.":"骑士。国王虽死,他的子嗣仍挤满竞技场。","Cull five slimes and the town will not forget it.":"清掉五只史莱姆,小镇不会忘记你的恩情。","I will help.":"我来帮忙。","Not my problem.":"与我无关。","The slimes still squelch out there. The portal will take you to the arena.":"外面的史莱姆还在吧唧作响。传送门可以送你去竞技场。","The squelching has stopped. The town breathes easier.":"吧唧声停了。小镇喘了口气。","Take this - and our thanks.":"收下这个——还有我们的谢意。","Claim reward.":"领取报酬。","Rest, knight. The town owes you its quiet.":"歇息吧,骑士。小镇的安宁是欠你的。","Two players, one world, no server: you and a friend swap two codes over any chat, then the browsers connect directly.":"两名玩家,一个世界,无需服务器:与朋友通过任意聊天工具交换两段代码,浏览器即可直接互联。","Your knight's name (floats overhead in co-op):":"你的骑士之名(联机时显示在头顶):","HOST GAME":"创建主机","JOIN GAME":"加入游戏","Preparing your invite code...":"正在生成邀请码……","1. Send this invite code to your friend:":"1. 把这段邀请码发给朋友:","2. Paste your friend's reply code here:":"2. 把朋友的回复码粘贴到这里:","COPY CODE":"复制代码",CONNECT:"连接","Connecting...":"连接中……","1. Paste the host's invite code:":"1. 粘贴主机的邀请码:","ACCEPT INVITE":"接受邀请","2. Send this reply code back to the host:":"2. 把这段回复码发回给主机:","Waiting for the host to connect...":"等待主机连接……","Building your reply code...":"正在生成回复码……","CO-OP GUEST":"联机来宾","CONNECTION LOST":"连接断开"}});cons
