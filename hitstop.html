  <title>hitstop — game feel is the foundation</title>
  <style>
    /* touch-action: none disables double-tap-to-zoom and pinch-zoom, so a
       double tap does nothing special (the game handles taps itself). */
    html, body { margin: 0; height: 100%; background: #07070d; overflow: hidden; touch-action: none; }
    body { display: flex; align-items: center; justify-content: center; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; background: #07070d; touch-action: none; }
    #tc { position: fixed; inset: 0; pointer-events: none; font-family: monospace; }
    .btn {
      position: absolute; width: 56px; height: 56px; border-radius: 12px;
      background: rgba(148, 176, 194, 0.14); border: 2px solid rgba(148, 176, 194, 0.35);
      color: #94b0c2; font-size: 20px; display: flex; align-items: center; justify-content: center;
      pointer-events: auto; user-select: none; -webkit-user-select: none; touch-action: none;
    }
    .btn:active { background: rgba(148, 176, 194, 0.3); }
    #bL { left: 16px; bottom: 88px; }
    #bR { left: 84px; bottom: 88px; }
    #bJ { right: 16px; bottom: 150px; }
    #bA { right: 84px; bottom: 88px; }
    #bD { right: 16px; bottom: 88px; }
    /* Interact / "use" (talk to NPCs) — the touch equivalent of E. */
    #bI { right: 84px; bottom: 150px; font-size: 13px; }
    /* Ice shard — the touch equivalent of B. */
    #bF { right: 152px; bottom: 88px; font-size: 22px; color: #73eff7; }
    /* Parry — the touch equivalent of F. */
    #bP { right: 152px; bottom: 150px; font-size: 20px; color: #ffcd75; }
    /* Menu / Esc — the mobile equivalent of the Esc key, tucked top-right. */
    #bM { right: 12px; top: 12px; width: 48px; height: 48px; font-size: 20px; }
    @media (pointer: fine) { #tc { display: none; } }
  </style>

owly reloaded.":"一声巨响定胜负,装填缓慢。","GATE KEY":"大门钥匙","CULL THE SLIMES":"清剿史莱姆","Slay 5 slimes for the town elder.":"为镇上的长老消灭 5 只史莱姆。",VOICE:"声音",HEALER:"治疗师",BLACKSMITH:"铁匠",ELDER:"长老",MERCHANT:"商人","SLIME KING":"史莱姆王","Another knight. The arena remembers them all.":"又一位骑士。竞技场记得他们每一个。","The slimes come in waves. The bats come for your head.":"史莱姆成波而来,蝙蝠直取你的首级。","Strike thrice for the heavy blow. Dash through what you cannot block.":"三连击可出重斩。挡不住的,就冲刺穿过去。","And when your hands burn... press C. You will understand.":"当你双手灼热时……按下 C,你自会明白。","I am ready.":"我准备好了。","Who are you?":"你是谁?","The last one who asked is wave seven now.":"上一个这么问的人,现在是第七波了。","Fight well, knight. The gate east opens to the cavern, if the waves bore you.":"好好战斗,骑士。若嫌波次无聊,东边的门通往洞窟。","The cavern. Quieter than the arena. Not safer.":"洞窟。比竞技场安静,却并不更安全。","Something old and green sits on a throne past the east gate.":"东门之后,有个又老又绿的东西坐在王座上。","Bow, or do not. He cannot tell.":"鞠躬与否,悉听尊便。反正他分不出来。","...Blorp.":"……咕啵。","When he shivers, move. When he burns red, pray.":"他颤抖时,快跑。他烧红时,祈祷吧。","Ah. A customer with a pulse. Rare, down here.":"啊,一位还有脉搏的客人。在这下面可真少见。","Coins for goods. Goods for surviving. Everyone wins.":"金币换货物,货物保性命。皆大欢喜。","Show me your wares.":"看看你的货物。","Where am I?":"这是哪里?","Just passing.":"路过而已。","The cavern under the arena. The king sits past the east gate.":"竞技场下的洞窟。国王就在东门之后。","He eats swords, you know. And the knights holding them.":"他吃剑,你知道吗。连举着剑的骑士一起吃。","And he spits. Sticky business, that. A draught burns it right off.":"他还会吐口水,黏糊糊的。一剂药水就能烧掉。","The crown rolls. The throne sits empty.":"王冠滚落,王座空悬。","You are what the arena remembers now, knight.":"如今竞技场记住的,是你,骑士。","The seal on the east road is broken. The town is waking up.":"东路的封印已破。小镇正在苏醒。","The town. It slept while the king sat fat below.":"小镇。国王在下面养膘时,它一直沉睡。","A healer, a smith, an elder with troubles - and a portal, humming east.":"治疗师、铁匠、满腹愁事的长老——还有东边嗡鸣的传送门。","Sit. You are more wound than knight.":"坐下吧。你身上的伤比骑士本身还多。","Ten gold and I will close all of it.":"十枚金币,我把它们全部合上。","Heal me. (10g)":"治疗我。(10金)","Not now.":"先不用。","That edge would bounce off warm bread.":"你这剑刃,砍热面包都会弹开。","Gold and fire fix most things. Swords especially.":"金子和炉火能修好大多数东西,尤其是剑。","Upgrade my weapon.":"强化我的武器。","Maybe later.":"以后再说。","Knight. The king is dead, but his spawn still choke the arena.":"骑士。国王虽死,他的子嗣仍挤满竞技场。","Cull five slimes and the town will not forget it.":"清掉五只史莱姆,小镇不会忘记你的恩情。","I will help.":"我来帮忙。","Not my problem.":"与我无关。","The slimes still squelch out there. The portal will take you to the arena.":"外面的史莱姆还在吧唧作响。传送门可以送你去竞技场。","The squelching has stopped. The town breathes easier.":"吧唧声停了。小镇喘了口气。","Take this - and our thanks.":"收下这个——还有我们的谢意。","Claim reward.":"领取报酬。","Rest, knight. The town owes you its quiet.":"歇息吧,骑士。小镇的安宁是欠你的。","Two players, one world, no server: you and a friend swap two codes over any chat, then the browsers connect directly.":"两名玩家,一个世界,无需服务器:与朋友通过任意聊天工具交换两段代码,浏览器即可直接互联。","Your knight's name (floats overhead in co-op):":"你的骑士之名(联机时显示在头顶):","HOST GAME":"创建主机","JOIN GAME":"加入游戏","Preparing your invite code...":"正在生成邀请码……","1. Send this invite code to your friend:":"1. 把这段邀请码发给朋友:","2. Paste your friend's reply code here:":"2. 把朋友的回复码粘贴到这里:","COPY CODE":"复制代码",CONNECT:"连接","Connecting...":"连接中……","1. Paste the host's invite code:":"1. 粘贴主机的邀请码:","ACCEPT INVITE":"接受邀请","2. Send this reply code back to the host:":"2. 把这段回复码发回给主机:","Waiting for the host to connect...":"等待主机连接……","Building your reply code...":"正在生成回复码……","CO-OP GUEST":"联机来宾","CONNECTION LOST":"连接断开"}});function es(s){return s instanceof ei?s.extraSolids:null}class Hi extends ge{constructor(t,i,n,o,a,r,l,B,w,m){var f;super();c(this,"solid");c(this,"t");this.x0=n,this.y0=o,this.dx=l,this.dy=B,this.period=w,this.t=m,this.solid={x:n,y:o,w:a,h:r},(f=es(i))==null||f.push(this.solid),this.layer=1}update(t){this.t+=t;const i=(1-Math.cos(this.t/this.period*Math.PI*2))/2,n=this.x0+this.dx*i,o=this.y0+this.dy*i,a=n-this.solid.x,r=o-this.solid.y;for(c
